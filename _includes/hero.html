<section class="hero" id="hero">
  <div class="hero__inner">
    <p class="hero__greeting reveal">{{ site.data.site.hero.greeting }}</p>
    <h1 class="hero__name reveal">{{ site.data.site.hero.name }}</h1>
    <h2 class="hero__title reveal">{{ site.data.site.hero.title }}</h2>
    <p class="hero__subtitle reveal">{{ site.data.site.hero.subtitle }}</p>
    <div class="hero__cta reveal">
      <a href="{{ site.social[2].url }}" class="btn btn--primary">Get in Touch</a>
      <a href="{{ site.resume }}" target="_blank" rel="noopener" class="btn btn--outline">Resume</a>
    </div>
  </div>
</section>
