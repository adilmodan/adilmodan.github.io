<section class="intro" id="intro">
  <div class="intro__inner">
    <h1 class="intro__name">{{ site.data.site.hero.name }}</h1>
    <p class="intro__bio">{{ site.data.site.hero.subtitle }}</p>
    <div class="intro__links">
      {% for link in site.social %}
      <a href="{{ link.url }}" target="_blank" rel="noopener" class="intro__link">{{ link.name }}</a>
      {% endfor %}
    </div>
  </div>
</section>
