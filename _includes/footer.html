<footer class="footer">
  <div class="footer__links">
    {% for link in site.social %}
    <a href="{{ link.url }}" target="_blank" rel="noopener" title="{{ link.name }}" class="footer__link">
      <img src="{{ site.baseurl }}/img/social/{{ link.icon }}.svg" alt="{{ link.name }}" width="20" height="20">
    </a>
    {% endfor %}
  </div>
  <p class="footer__credit">{{ site.data.site.footer.credit }}</p>
</footer>
