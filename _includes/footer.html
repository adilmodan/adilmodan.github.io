<footer class="footer">
  <div class="footer__inner">
    <div class="footer__links">
      {% for link in site.social %}
      <a href="{{ link.url }}" target="_blank" rel="noopener" class="footer__link">{{ link.name }}</a>
      {% endfor %}
      <a href="{{ site.resume }}" target="_blank" rel="noopener" class="footer__link">Resume</a>
    </div>
    <p class="footer__credit">{{ site.data.site.footer.credit }}</p>
  </div>
</footer>
