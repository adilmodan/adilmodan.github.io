<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
    <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  {{ content }}
  <footer class="footer">
    <div class="footer__inner">
      <div class="footer__links">
        {% for link in site.social %}
        <a href="{{ link.url }}" target="_blank" rel="noopener">{{ link.name }}</a>
        {% endfor %}
        <a href="{{ site.resume }}" target="_blank" rel="noopener">Resume</a>
      </div>
      <span class="footer__credit">{{ site.data.site.footer.credit }}</span>
    </div>
  </footer>
  {% include scripts.html %}
</body>
</html>
