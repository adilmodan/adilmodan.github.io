bio: >-
  Engineer and builder in the Bay Area. I work on infrastructure
  at scale and build tools on the side.

beliefs:
  - I design infrastructure that disappears when it's working.
  - I think the best tools are the ones you barely notice.
  - I think side projects should solve real problems.
  - I believe good systems earn trust — you shouldn't have to think about them.
  - I think there's a lot more to build at the intersection of tech and faith.
  - One day I'll run a six-minute mile.

about:
  - >-
    I'm a Platform Engineer working on large-scale Kubernetes
    infrastructure — the kind of systems that need to stay up when
    millions of people show up at once.
  - >-
    I grew up building things. Before engineering, I founded
    <strong>Marin CoWork</strong> — a coworking startup I took from
    zero to profitable. I wrote all the software: CRM, payments
    ($27M+ annually), analytics.
  - >-
    Today I'm building
    <a href="https://tijara-five.vercel.app" target="_blank" rel="noopener">Tijara</a>,
    a Shari'ah-compliant stock screening engine. I studied Electrical
    Engineering at San Francisco State University.
  - >-
    When I'm not building, I'm training as a hybrid athlete, at the
    mosque, or reading about markets and investing.

