bio: >-
  Platform Engineer at Apple. I keep large-scale Kubernetes
  clusters running — the kind that can't go down.

beliefs:
  - "i build things."
  - "mostly the kind nobody sees — infrastructure, pipelines, the systems underneath the systems."
  - "i think the best software stays out of your way."
  - "i also think some problems don't get built for because the market's too small."
  - "halal investing is one of those problems."
  - 'so i''m building <a href="https://tijara-five.vercel.app" target="_blank" rel="noopener">Tijara</a>.'

about:
  - >-
    I'm a Platform Engineer at <strong>Apple</strong>, working on
    large-scale Kubernetes infrastructure — the kind of systems that
    need to stay up when millions of people show up at once.
  - >-
    I grew up building things. Before engineering, I founded
    <strong>Marin CoWork</strong> — a coworking startup I took from
    zero to profitable. I wrote all the software: CRM, payments
    ($27M+ annually), analytics. I studied Electrical Engineering
    at <strong>San Francisco State University</strong>.
  - >-
    On the side, I'm building
    <a href="https://tijara-five.vercel.app" target="_blank" rel="noopener">Tijara</a>
    — a Shari'ah-compliant stock screening engine that validates
    equities against AAOIFI Islamic finance standards.
  - >-
    When I'm not building infrastructure, I'm building AI apps,
    bots, and skills in my personal AI lab — or at the mosque,
    or reading about markets and investing.

