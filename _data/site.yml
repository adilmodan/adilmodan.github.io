hero:
  greeting: "Hi, I'm"
  name: Adil Modan
  title: Engineer & Builder
  subtitle: >-
    I build things — from large-scale infrastructure platforms to
    Islamic finance tools to this website. Based in the Bay Area.

about:
  paragraphs:
    - >-
      I'm an engineer who likes building systems that work at scale and
      tools that solve real problems. By day, I work on platform
      infrastructure — Kubernetes, observability, CI/CD — the stuff that
      keeps services running when millions of people show up at once.
    - >-
      On the side, I'm building <a href="https://tijara-five.vercel.app"
      target="_blank" rel="noopener">Tijara</a>, a Shari'ah-compliant
      stock screening engine rooted in Islamic finance principles. More
      projects are on the way.
    - >-
      Before engineering, I founded <strong>Marin CoWork</strong> — a
      coworking startup I built from zero to profitable, writing the
      software that powered everything from CRM to payments.
    - >-
      When I'm not building, I'm probably training (chasing a 6-minute
      mile), at the mosque, or reading about markets.

footer:
